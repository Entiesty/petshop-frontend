<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150">
  <!-- 背景圆形 -->
  <circle cx="75" cy="75" r="70" fill="#FEF8ED" stroke="#F77F00" stroke-width="3"/>
  
  <!-- 小狗形象 -->
  <g transform="translate(30, 40)">
    <!-- 狗头 -->
    <ellipse cx="30" cy="30" rx="25" ry="28" fill="#FDBE5C"/>
    <!-- 耳朵 -->
    <path d="M10 15 Q5 5 15 8" fill="#FDBE5C" stroke="#EB5E0C" stroke-width="1.5"/>
    <path d="M50 15 Q55 5 45 8" fill="#FDBE5C" stroke="#EB5E0C" stroke-width="1.5"/>
    <!-- 眼睛 -->
    <circle cx="20" cy="25" r="3" fill="#333"/>
    <circle cx="40" cy="25" r="3" fill="#333"/>
    <!-- 鼻子 -->
    <ellipse cx="30" cy="35" rx="6" ry="4" fill="#EB5E0C"/>
    <!-- 嘴巴 -->
    <path d="M30 40 Q25 45 30 47 Q35 45 30 40" fill="#EB5E0C"/>
  </g>

  <!-- 小猫形象 -->
  <g transform="translate(75, 45)">
    <!-- 猫头 -->
    <ellipse cx="25" cy="25" rx="20" ry="22" fill="#F9BC66"/>
    <!-- 耳朵 -->
    <polygon points="15,8 10,0 20,5" fill="#F9BC66" stroke="#EB5E0C" stroke-width="1"/>
    <polygon points="35,8 40,0 30,5" fill="#F9BC66" stroke="#EB5E0C" stroke-width="1"/>
    <!-- 眼睛 -->
    <ellipse cx="17" cy="22" rx="2.5" ry="4" fill="#333"/>
    <ellipse cx="33" cy="22" rx="2.5" ry="4" fill="#333"/>
    <!-- 鼻子 -->
    <path d="M25 28 L22 30 L28 30 Z" fill="#EB5E0C"/>
    <!-- 嘴巴 -->
    <path d="M25 30 Q22 33 25 35 Q28 33 25 30" fill="none" stroke="#EB5E0C" stroke-width="1"/>
    <!-- 胡须 -->
    <line x1="12" y1="28" x2="20" y2="30" stroke="#666" stroke-width="0.5"/>
    <line x1="12" y1="30" x2="20" y2="30" stroke="#666" stroke-width="0.5"/>
    <line x1="12" y1="32" x2="20" y2="30" stroke="#666" stroke-width="0.5"/>
    <line x1="38" y1="28" x2="30" y2="30" stroke="#666" stroke-width="0.5"/>
    <line x1="38" y1="30" x2="30" y2="30" stroke="#666" stroke-width="0.5"/>
    <line x1="38" y1="32" x2="30" y2="30" stroke="#666" stroke-width="0.5"/>
  </g>

  <!-- 品牌名称 -->
  <text x="75" y="115" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#F77F00" text-anchor="middle" font-weight="bold">萌宠之家</text>
</svg>
